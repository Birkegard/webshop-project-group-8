<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<main>
    <h1>Your cart</h1>

    <div th:if="${#lists.isEmpty(cart.items)}">
        <p>Your cart is empty</p>
        <a th:href="@{/products}">Continue browsing products</a>
    </div>

    <div th:unless="${#lists.isEmpty(cart.items)}">
        <table>
            <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Remove</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart.items}">
                <td th:text="${item.productName}">Product</td>
                <td th:text="${#numbers.formatDecimal(item.price, 1, 2)} + ' SEK'"></td>

                <td>
                    <form th:action="@{/cart/decrease/{id}(id=${item.productId})}" method="post"
                          style="display:inline;">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit">-</button>
                    </form>
                    <span th:text="${item.quantity}" style="margin: 0 10px;">1</span>

                    <form th:action="@{/cart/add/{id}(id=${item.productId})}" method="post"
                          style="display:inline;">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit">+</button>
                    </form>
                </td>
                <td>
                    <form th:action="@{/cart/remove/{id}(id=${item.productId})}" method="post">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <p>
            <strong>Total price: </strong>
            <span th:text="${#numbers.formatDecimal(cart.totalPrice, 1, 2)} + ' SEK'"></span>
        </p>

        <form th:action="@{/cart/clear}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit">Empty cart</button>
        </form>

        <form th:action="@{/cart/checkout}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit">Checkout</button>
        </form>

        <br>
        <a th:href="@{/products}">Continue shopping</a>
    </div>
</main>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
