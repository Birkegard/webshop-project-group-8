<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .navbar {
            margin-bottom: 20px;
        }

        .navbar a {
            margin-right: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .products {
            display: flex;
            gap: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 15px;
            width: 200px;
            text-align: center;
            border-radius: 8px;
        }

        img {
            width: 150px;
            margin-bottom: 10px;
        }

        button {
            margin-top: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/products">Products</a>
</div>

<h1>Products</h1>

<div class="products">
    <div class="card" th:each="product : ${products}">
        <a th:href="@{/products/{name}(name=${product.name})}">
            <h2 th:text="${product.name}"></h2>
        </a>
        <p th:text="${product.category}"></p>
        <p th:text="${product.price}"></p>
        <img th:src="${product.imageURL}"/>
        <button>Add to cart</button>
    </div>
</div>

<div style="margin-top:20px;">
    <a href="/">← Back to Home</a>
</div>

</body>
</html>
