<header th:fragment="header">
    <h1>Caya Clothes</h1>
    <nav>
        <a th:href="@{/}" th:classappend="${activePage == 'home'} ? 'active'">Home</a>
        <a th:href="@{/products}" th:classappend="${activePage == 'products'} ? 'active'">Produkter</a>
    </nav>
    <div th:if="${session.user != null}">
        <span th:text="${session.user.name}">Användarnamn</span>
        <a th:href="@{/logout}">Logga ut</a>
    </div>
    <div th:unless="${session.user != null}">
        <a th:href="@{/login}">Logga in</a>
    </div>

</header>
